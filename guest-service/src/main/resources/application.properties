spring.application.name=guest-service
server.port=8081

# Pgadmin 15 Configuration
spring.datasource.url=jdbc:postgresql://localhost:5000/guestDb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
springdoc.api-docs.enabled = true
springdoc.swagger-ui.enabled=true
spring.main.allow-bean-definition-overriding=true

# Kafka Consumer Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=guest-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserializers (Translating bytes back to Java Objects)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Security setting to trust incoming JSON objects
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.imagica.guest_service.dto.TicketBookedEvent

